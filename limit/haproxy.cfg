
global       
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 1d

    log /dev/log local0
    log /dev/log local1 notice
    log /dev/log local0 info
    
    tune.h2.initial-window-size 2147483647
    tune.ssl.default-dh-param 2048

    pidfile /run/haproxy.pid
    chroot /var/lib/haproxy

    user haproxy
    group haproxy
    daemon

    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11

    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

defaults
    log global
    mode tcp
    option dontlognull
    timeout connect 200ms
    timeout client  300s
    timeout server  300s

frontend api_frontend_8081
    bind *:8081
    mode http
    option httplog

    acl is_api path_beg /api
    http-request deny deny_status 403 unless is_api
    use_backend api_backend if is_api

backend api_backend
    mode http
    balance roundrobin
    server api1 127.0.0.1:8080
    
frontend http_frontend
    bind *:80 tfo
    bind *:8080 tfo
    bind *:8880 tfo
    bind *:2080 tfo
    bind *:2082 tfo
    mode tcp
    tcp-request inspect-delay 500ms
    tcp-request content accept if HTTP
    acl is_websocket hdr(Upgrade) -i websocket
    use_backend ws_backend if is_websocket
    default_backend dropbear_backend

frontend https_frontend
    bind *:443 ssl crt /etc/haproxy/sanz.pem alpn h2,http/1.1 tfo
    mode tcp
    tcp-request inspect-delay 500ms
    tcp-request content accept if { req.ssl_hello_type 1 }
    acl grpc_request ssl_fc_alpn -i h2
    use_backend grpc_backend if grpc_request
    acl is_websocket_ssl hdr(Upgrade) -i websocket
    use_backend ws_backend if is_websocket_ssl
    default_backend dropbear_backend
    
backend grpc_backend
    mode tcp
    server grpc_server 127.0.0.1:1013 send-proxy check
    
backend dropbear_backend
    mode tcp
    server dropbear_server 127.0.0.1:58080 check
    
backend ws_backend
    mode tcp
    server ws_server 127.0.0.1:1010 check

backend payload_backend
    mode tcp
    balance roundrobin
    server payload_server_vless 127.0.0.1:10001 check
    server payload_server_vmess 127.0.0.1:10002 check
    server payload_server_trojan 127.0.0.1:10003 check
    server payload_server_grpc 127.0.0.1:10004 check
    server payload_server_vless2 127.0.0.1:10005 check
    server payload_server_vmess2 127.0.0.1:10006 check
    server payload_server_trojan2 127.0.0.1:10007 check
    server payload_server_grpc2 127.0.0.1:10008 check
    server ssh_server 127.0.0.1:10015 check
    
backend ssh_backend
    mode tcp
    server ssh_server 127.0.0.1:10015 check    
    
frontend multiport
    mode tcp
    # bind-process 1 2
    bind *:222-1000 tfo
    tcp-request inspect-delay 500ms
    tcp-request content accept if HTTP
    tcp-request content accept if { req.ssl_hello_type 1 }
    use_backend recir_http if HTTP 
    default_backend recir_https

frontend multiports
    mode tcp
    bind abns@haproxy-http accept-proxy tfo
    default_backend recir_https_www

frontend ssl
    mode tcp
    # bind-process 1
    bind *:444 tfo
    bind *:777 tfo    
    bind abns@haproxy-https accept-proxy ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo
    
    tcp-request inspect-delay 500ms
    tcp-request content capture req.ssl_sni len 100
    tcp-request content accept if { req.ssl_hello_type 1 }

    acl chk-02_up hdr(Connection) -i upgrade
    acl chk-02_ws hdr(Upgrade) -i websocket
    acl this_payload payload(0,7) -m bin 5353482d322e30
    acl up-to ssl_fc_alpn -i h2

    use_backend GRUP_LITE if up-to
    use_backend LITE if chk-02_up chk-02_ws 
    use_backend LITE if { path_reg -i ^\/(.*) }
    use_backend BOT_LITE if this_payload
    default_backend CHANNEL_LITE
    
backend recir_https_www
    mode tcp
    server misssv-bau 127.0.0.1:2223 check
     
backend LITE
    mode http
    server lite-vermilion 127.0.0.1:1010 send-proxy check 

backend GRUP_LITE
    mode tcp
    server lite-vermilions 127.0.0.1:1013 send-proxy check
    
backend CHANNEL_LITE
    mode tcp
    balance roundrobin
    server y-lite 127.0.0.1:1194 check
    server lite-x 127.0.0.1:1012 send-proxy check

backend BOT_LITE
    mode tcp
    server xiao-lite 127.0.0.1:2222 check
    
backend recir_http
    mode tcp
    server loopback-for-http abns@haproxy-http send-proxy-v2 check
    
backend recir_https
    mode tcp
    server loopback-for-https abns@haproxy-https send-proxy-v2 check

    
